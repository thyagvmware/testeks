apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sre-demo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/thyagvmware/testeks.git
    targetRevision: HEAD
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true